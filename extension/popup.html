<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrustIndex</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #ffffff12;
            --border2: #ffffff22;
            --text: #f0ede8;
            --muted: #8a8799;
            --accent: #c8f064;
            --accent2: #7c6fec;
            --red: #ff5f57;
            --amber: #ffc44d;
            --green: #c8f064;
            --serif: 'DM Serif Display', serif;
            --sans: 'Instrument Sans', sans-serif;
            --mono: 'DM Mono', monospace;
        }

        body {
            width: 320px;
            min-height: 400px;
            margin: 0;
            padding: 16px;
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            opacity: 0.6;
            z-index: 0;
        }

        .header {
            display: flex;
            align-items: baseline;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 0.5px solid var(--border2);
            position: relative;
            z-index: 1;
        }

        .logo {
            font-family: var(--serif);
            font-size: 20px;
            font-weight: 600;
            letter-spacing: -0.01em;
            color: var(--text);
        }

        .logo span {
            color: var(--accent);
        }

        .title {
            font-size: 12px;
            color: var(--muted);
            font-family: var(--mono);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .current-site {
            background: var(--surface);
            border: 0.5px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .site-name {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            font-family: var(--mono);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .site-domain {
            font-size: 14px;
            font-weight: 500;
            word-break: break-all;
            color: var(--text);
        }

        .score-display {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 24px 0;
            position: relative;
            z-index: 1;
        }

        .score-circle {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .score-circle svg {
            transform: rotate(-90deg);
        }

        .score-number {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .score-value {
            font-family: var(--serif);
            font-size: 24px;
            line-height: 1;
            color: var(--text);
            font-weight: 600;
        }

        .score-label {
            font-size: 10px;
            font-family: var(--mono);
            color: var(--muted);
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .grade-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 10px;
            font-family: var(--mono);
            font-weight: 500;
            margin: 12px auto;
            background: var(--accent);
            color: #0a0a0f;
            position: relative;
            z-index: 1;
        }

        .grade-b {
            background: var(--accent2);
            color: white;
        }

        .grade-c {
            background: var(--amber);
            color: #0a0a0f;
        }

        .grade-d {
            background: var(--red);
            color: white;
        }

        .actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
            position: relative;
            z-index: 1;
        }

        .btn {
            background: var(--accent);
            color: #0a0a0f;
            border: none;
            border-radius: 8px;
            padding: 14px 20px;
            cursor: pointer;
            font-family: var(--sans);
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: opacity 0.15s;
            white-space: nowrap;
        }

        .btn:hover {
            opacity: 0.88;
        }

        .btn-secondary {
            background: var(--accent2);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--muted);
            position: relative;
            z-index: 1;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 2px solid var(--border2);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .error {
            background: rgba(255, 95, 87, 0.1);
            border: 0.5px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            margin: 16px 0;
            font-size: 12px;
            color: var(--red);
            position: relative;
            z-index: 1;
        }

        .settings {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 0.5px solid var(--border);
            position: relative;
            z-index: 1;
        }

        .settings-title {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            font-family: var(--mono);
        }

        .input-group {
            margin-bottom: 16px;
        }

        .input-label {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 6px;
            display: block;
            font-family: var(--mono);
            letter-spacing: 0.06em;
        }

        .input {
            width: 100%;
            background: var(--surface);
            border: 0.5px solid var(--border2);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text);
            font-size: 14px;
            font-family: var(--sans);
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        .input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .input::placeholder {
            color: var(--muted);
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo">Trust<span>Index</span></div>
        <div class="title">Privacy intelligence</div>
    </div>

    <div id="content">
        <div class="loading">
            <div class="spinner"></div>
            <div>Loading TrustIndex...</div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>

</html>
